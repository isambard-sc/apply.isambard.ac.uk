  "docs/bristol/images/**/*.png",
  "docs/user-documentation/images/**/*.png",
  "docs/user-documentation/getting_started/images/getting_started/*.png",
  "docs/user-documentation/guides/images/**/*.png",
  "docs/user-documentation/guides/containers/images/*.png",
  "docs/user-documentation/tutorials/interactive-ml/*.png",
  "docs/user-documentation/tutorials/distributed-training/*.png",
  "docs/user-documentation/tutorials/images/setup/*.png",
]
