SPDX-License-Identifier = "CC-BY-SA-4.0"

[[annotations]]
# Code snippets
path = [
  "docs/user-documentation/guides/example-data/slurm/*",
  "docs/user-documentation/applications/alphafold/example-data/*",
  "docs/user-documentation/guides/containers/example-data/*",
  "docs/user-documentation/guides/example-data/jupyter/*",
  "docs/user-documentation/guides/example-data/vscode/*",
  "docs/user-documentation/tutorials/distributed-training/*",
]
